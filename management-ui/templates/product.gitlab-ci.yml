# Шаблон CI/CD для продуктов — сборка артефактов и обновление продуктовой страницы
# Генерируется оркестратором. Переменные {{RUNNER_TAG}} и {{DEFAULT_BRANCH}} подставляются при генерации.
# CI Variables: DOWNLOADS_PATH, PROJECT_SLUG, MANAGEMENT_UI_URL, MANAGEMENT_UI_TOKEN
#
# Триггер: создание тега вида v* (например v1.0.0)

stages:
  - build
  - publish

variables:
  NODE_VERSION: "20"

build:artifacts:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - |
      if [ -f package.json ]; then
        npm ci
        npm run build
      fi
  artifacts:
    paths:
      - dist/
      - build/
      - out/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

publish:
  stage: publish
  tags:
    - {{RUNNER_TAG}}
  dependencies:
    - build:artifacts
  script:
    # Копирование артефактов в директорию для скачивания
    - mkdir -p $DOWNLOADS_PATH
    - |
      if [ -d "dist" ]; then
        cp -r dist/* $DOWNLOADS_PATH/ 2>/dev/null || true
      elif [ -d "build" ]; then
        cp -r build/* $DOWNLOADS_PATH/ 2>/dev/null || true
      elif [ -d "out" ]; then
        cp -r out/* $DOWNLOADS_PATH/ 2>/dev/null || true
      fi
    # Отправка релиза в Management UI (обновляет Strapi как draft)
    - |
      if [ -n "$MANAGEMENT_UI_URL" ] && [ -n "$MANAGEMENT_UI_TOKEN" ] && [ -n "$PROJECT_SLUG" ]; then
        echo "Отправка релиза $CI_COMMIT_TAG в Management UI для проекта $PROJECT_SLUG"
        HTTP_STATUS=$(curl -s -o /tmp/release_response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $MANAGEMENT_UI_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"version\":\"$CI_COMMIT_TAG\",\"downloadUrl\":\"/downloads/$PROJECT_SLUG/\",\"source\":\"ci\"}" \
          "$MANAGEMENT_UI_URL/api/publish/projects/$PROJECT_SLUG/release")
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Релиз отправлен (draft). Для публикации на сайте — подтвердите в Management UI."
        else
          echo "ОШИБКА: Management UI вернул HTTP $HTTP_STATUS"
          cat /tmp/release_response.json 2>/dev/null
          exit 1
        fi
      else
        echo "ОШИБКА: переменные MANAGEMENT_UI_URL, MANAGEMENT_UI_TOKEN или PROJECT_SLUG не заданы"
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
