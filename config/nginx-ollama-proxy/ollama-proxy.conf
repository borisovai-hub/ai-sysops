upstream ollama_11434_backend {
    server 127.0.0.1:11434 max_fails=0 fail_timeout=0;
    keepalive 4;
}

upstream ollama_11435_backend {
    server 127.0.0.1:11435 max_fails=0 fail_timeout=0;
    keepalive 4;
}

upstream ollama_11436_backend {
    server 127.0.0.1:11436 max_fails=0 fail_timeout=0;
    keepalive 4;
}

# Retry settings shared by both upstream blocks below
map $status $retryable { default 0; }

server {
    listen 21434;
    server_name _;

    proxy_connect_timeout 5s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 10;
    proxy_next_upstream_timeout 60s;

    proxy_buffering off;
    proxy_request_buffering on;

    location / {
        proxy_pass http://ollama_11434_backend;
    }
}

server {
    listen 21435;
    server_name _;

    # Увеличенные таймауты на случай медленной загрузки модели + reconnect frpc
    proxy_connect_timeout 5s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Ретраи: если backend отвалился — ждём и пробуем снова
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 10;
    proxy_next_upstream_timeout 60s;

    # Буферизация (чтобы клиент не видел обрыв при reconnect frpc)
    proxy_buffering off;
    proxy_request_buffering on;

    location / {
        proxy_pass http://ollama_11435_backend;
    }
}

server {
    listen 21436;
    server_name _;

    proxy_connect_timeout 5s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 10;
    proxy_next_upstream_timeout 60s;

    proxy_buffering off;
    proxy_request_buffering on;

    location / {
        proxy_pass http://ollama_11436_backend;
    }
}
