# Конфигурация сервера contabo-sm-139 (Contabo Single Machine)
# Используется оркестратором для выбора целевого хоста при деплое
# и скриптом upload-single-machine.sh для подключения по SSH

# Подключение по SSH
ssh_host: "144.91.108.139"
ssh_user: "root"

# Внутренний IP сервера (для Traefik backend)
internal_ip: "127.0.0.1"

# Тег GitLab Runner на этом сервере
runner_tag: "deploy-production"

# Базовый домен для поддоменов проектов
base_domain: "borisovai.ru"

# Порты
management_ui_port: 3000
dns_api_port: 5353
traefik_dashboard_port: 8080

# Пути на сервере
deploy_base_path: "/var/www"
traefik_dynamic_dir: "/etc/traefik/dynamic"

# Папка с конфигами этого сервера в Git
config_dir: "config/contabo-sm-139"
