server {
    listen 80;
    server_name _;

    root /srv/files;

    # Оптимизация для больших файлов (AI модели до 3 GB)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Дополнительные MIME types для AI моделей
    types {
        application/octet-stream bin gguf safetensors onnx pt pth;
        application/json json;
        text/plain txt log csv md;
        text/html html;
        application/zip zip;
        application/gzip gz;
        application/x-tar tar;
    }
    include /etc/nginx/mime.types;

    # Отключить gzip для бинарных файлов (модели уже не сжимаемы)
    gzip off;

    # Health check
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Публичная зона — CORS для кросс-доменных запросов (загрузка моделей)
    location /public/ {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Access-Control-Max-Age "86400" always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Приватная зона (доступ через Authelia на уровне Traefik)
    location /private/ {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Корень — autoindex для навигации
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
