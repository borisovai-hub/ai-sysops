services:
  fileserver:
    image: nginx:alpine
    container_name: fileserver
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - /srv/files:/srv/files:ro
      - /etc/fileserver/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
