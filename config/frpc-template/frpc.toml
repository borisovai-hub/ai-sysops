# frpc.toml — клиент туннелирования
# Скачать frpc: https://github.com/fatedier/frp/releases (frp_*_windows_amd64.zip → frpc.exe)
# Запуск: frpc.exe -c frpc.toml
# Документация: https://gofrp.org/en/docs/

# ВАЖНО: используем IP, а не hostname. При переподключении системный DNS
# периодически не резолвит borisovai.tech (no such host / i/o timeout),
# что превращает короткий разрыв TCP в длительный downtime туннеля.
serverAddr = "144.91.108.139"
serverPort = 17421
auth.token = "ВСТАВЬТЕ_ТОКЕН_ИЗ_/etc/frp/frps.toml"

# Keep retrying on connection failures instead of exiting.
loginFailExit = false

# Quorum DNS для любых внутренних lookup'ов клиента (Cloudflare + Google).
# Независимо от локального systemd-resolved / DHCP.
dnsServer = "1.1.1.1"

# QUIC — нативный keepalive, не страдает от heartbeat-флапов KCP
transport.protocol = "quic"

# HTTP туннель (самый частый сценарий)
# Результат: https://my-project.tunnel.borisovai.ru → localhost:3000
[[proxies]]
name = "my-project"
type = "http"
localPort = 3000
subdomain = "my-project"

# Ещё один HTTP туннель (раскомментировать при необходимости)
# [[proxies]]
# name = "api"
# type = "http"
# localPort = 8080
# subdomain = "api"

# TCP туннель — например, для базы данных (раскомментировать при необходимости)
# [[proxies]]
# name = "db"
# type = "tcp"
# localPort = 5432
# remotePort = 17500
