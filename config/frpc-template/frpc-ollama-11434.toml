# frpc-ollama-11434.toml -- Ollama tunnel to server (main machine)
# Services on server access Ollama at localhost:11434
#
# Download frpc: https://github.com/fatedier/frp/releases (frp_*_windows_amd64.zip -> frpc.exe)
# Run: frpc.exe -c frpc-ollama-11434.toml
# Verify on server: curl http://localhost:11434/api/tags

# IP вместо hostname: исключаем DNS-lookup при каждом reconnect.
# Клиенты за слабым резолвером получали "no such host" и лежали минутами.
serverAddr = "144.91.108.139"
serverPort = 17420
auth.token = "6LBjqYzczHmQ6U2Q8XCqVCtxstfudzs"

# Keep retrying on connection failures instead of exiting
loginFailExit = false
dnsServer = "1.1.1.1"

# KCP (UDP reliable, аналог QUIC) — переживает packet loss до 30%,
# восстановление сессии 1–3 c вместо 30–90 c TCP heartbeat.
transport.protocol = "kcp"
transport.heartbeatInterval = 15
transport.heartbeatTimeout = 45

# TCP tunnel: server localhost:11434 -> local Ollama localhost:11434
[[proxies]]
name = "ollama-11434"
type = "tcp"
localIP = "127.0.0.1"
localPort = 11434
remotePort = 11434
