http:
  middlewares:
    management-ui-compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

  routers:
    # API с Bearer-токеном — без Authelia (Express проверяет токен)
    management-ui-api-tech:
      rule: "Host(`admin.borisovai.tech`) && PathPrefix(`/api/`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - management-ui-compress

    management-ui-api-ru:
      rule: "Host(`admin.borisovai.ru`) && PathPrefix(`/api/`) && HeaderRegexp(`Authorization`, `^Bearer .+`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - management-ui-compress

    # Cross-domain SSO sync — без Authelia (принимает одноразовый токен)
    management-ui-sync-tech:
      rule: "Host(`admin.borisovai.tech`) && Path(`/auth/cross-sync-accept`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 200

    management-ui-sync-ru:
      rule: "Host(`admin.borisovai.ru`) && Path(`/auth/cross-sync-accept`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 200

    # Браузер — через Authelia ForwardAuth
    management-ui-tech:
      rule: "Host(`admin.borisovai.tech`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - management-ui-compress
        - authelia@file

    management-ui-ru:
      rule: "Host(`admin.borisovai.ru`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - management-ui-compress
        - authelia@file

  services:
    management-ui:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3000"
