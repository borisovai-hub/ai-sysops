http:
  middlewares:
    management-ui-compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

  routers:
    management-ui-tech:
      rule: "Host(`admin.borisovai.tech`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - management-ui-compress

    management-ui-ru:
      rule: "Host(`admin.borisovai.ru`)"
      service: management-ui
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - management-ui-compress

  services:
    management-ui:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3000"
