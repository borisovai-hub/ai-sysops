# This file is auto-generated by the Mailu configuration wizard.
# Please read the documentation before attempting any change.
# Generated for compose flavor

services:

  # External dependencies
  redis:
    image: redis:alpine
    restart: always
    volumes:
      - "/opt/mailu/redis:/data"


  # Core services
  front:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}nginx:${MAILU_VERSION:-2.0}
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-front
    ports:


      - "127.0.0.1:6555:80"


      - "[::1]:6555:80"



      - "127.0.0.1:6554:443"


      - "[::1]:6554:443"



      - "0.0.0.0:25:25"


      - "[::]:25:25"



      - "0.0.0.0:465:465"


      - "[::]:465:465"



      - "0.0.0.0:587:587"


      - "[::]:587:587"



      - "0.0.0.0:110:110"


      - "[::]:110:110"



      - "0.0.0.0:995:995"


      - "[::]:995:995"



      - "0.0.0.0:143:143"


      - "[::]:143:143"



      - "0.0.0.0:993:993"


      - "[::]:993:993"



      - "0.0.0.0:4190:4190"


      - "[::]:4190:4190"


    networks:
      - default

      - webmail


    volumes:
      - "/opt/mailu/certs:/certs"
      - "/opt/mailu/overrides/nginx:/overrides:ro"


  admin:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}admin:${MAILU_VERSION:-2.0}
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-admin

    volumes:
      - "/opt/mailu/data:/data"
      - "/opt/mailu/dkim:/dkim"
    depends_on:
      - redis


  imap:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}dovecot:${MAILU_VERSION:-2.0}
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-imap
    volumes:
      - "/opt/mailu/mail:/mail"
      - "/opt/mailu/overrides/dovecot:/overrides:ro"
    networks:
      - default

    depends_on:
      - front



  smtp:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}postfix:${MAILU_VERSION:-2.0}
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-smtp
    volumes:
      - "/opt/mailu/mailqueue:/queue"
      - "/opt/mailu/overrides/postfix:/overrides:ro"
    depends_on:
      - front






  antispam:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}rspamd:${MAILU_VERSION:-2.0}
    hostname: antispam
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-antispam
    networks:
      - default


    volumes:
      - "/opt/mailu/filter:/var/lib/rspamd"
      - "/opt/mailu/overrides/rspamd:/overrides:ro"
    depends_on:
      - front
      - redis




  # Optional services






  # Webmail

  webmail:
    image: ${DOCKER_ORG:-ghcr.io/mailu}/${DOCKER_PREFIX:-}webmail:${MAILU_VERSION:-2.0}
    restart: always
    env_file: mailu.env
    logging:
      driver: journald
      options:
        tag: mailu-webmail
    volumes:
      - "/opt/mailu/webmail:/data"
      - "/opt/mailu/overrides/roundcube:/overrides:ro"
    networks:
      - webmail
    depends_on:
      - front


  webdav:
    image: ghcr.io/mailu/radicale:2.0
    restart: always
    env_file: mailu.env
    volumes:
      - "/opt/mailu/dav:/data"
    depends_on:
      - front

networks:
  default:

    enable_ipv6: true

    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.203.0/24

        - subnet: fd4d:6169:6c63:6f77::/64



  webmail:
    driver: bridge
