# CI/CD для borisovai-admin — автодеплой на сервер при push в main
# CI Variables (задаются в GitLab Settings → CI/CD → Variables):
#   GITLAB_URL, GITLAB_TOKEN (masked), STRAPI_URL, STRAPI_TOKEN (masked), BASE_DOMAIN
#
# Раннеры:
#   deploy-production — обычный раннер (gitlab-runner user), для validate/verify
#   deploy-root       — привилегированный раннер (root), для install/deploy

stages:
  - validate
  - build
  - install
  - deploy
  - verify

validate:configs:
  stage: validate
  tags:
    - deploy-production
  script:
    - bash scripts/ci/render-configs.sh --validate
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Клонирование/обновление config repo (server-configs)
sync:configs:
  stage: validate
  tags:
    - deploy-root
  script:
    - |
      CONFIG_REPO="${CONFIG_REPO_DIR:-/opt/server-configs}"
      if [ -z "$CONFIG_REPO_URL" ]; then
        echo "CONFIG_REPO_URL не задан — пропуск sync:configs"
        exit 0
      fi
      if [ -d "$CONFIG_REPO/.git" ]; then
        echo "Обновление config repo..."
        git -C "$CONFIG_REPO" remote set-url origin "$CONFIG_REPO_URL"
        cd "$CONFIG_REPO"
        # Сохраняем локальные изменения (GitOps edits) и обновляем
        git stash --include-untracked 2>/dev/null || true
        git pull --rebase origin main || {
          echo "Rebase не удался — сброс к remote версии"
          git rebase --abort 2>/dev/null || true
          git reset --hard origin/main
        }
        git stash pop 2>/dev/null || echo "Нет stashed изменений или конфликт — используем remote версию"
      else
        echo "Клонирование config repo..."
        git clone "$CONFIG_REPO_URL" "$CONFIG_REPO"
      fi
      # Ensure management-ui user can read+write config files (GitOps edits)
      chmod -R o+rX "$CONFIG_REPO"
      # Management-ui needs write access to dns/records.json, ru-proxy/domains.json
      SN="${SERVER_NAME:-contabo-sm-139}"
      for f in "$CONFIG_REPO/servers/$SN/dns/records.json" "$CONFIG_REPO/servers/$SN/ru-proxy/domains.json"; do
        [ -f "$f" ] && chown management-ui:management-ui "$f" && chmod 664 "$f"
      done
      echo "Config repo: $(git -C "$CONFIG_REPO" log -1 --oneline)"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Сборка monorepo (shared → backend + frontend)
build:management-ui:
  stage: build
  tags:
    - deploy-root
  needs: []
  script:
    - cd management-ui
    - npm ci
    - rm -rf shared/dist backend/dist frontend/dist
    - rm -f shared/tsconfig.tsbuildinfo backend/tsconfig.tsbuildinfo
    - npm run build
    - echo "Сборка завершена"
  artifacts:
    paths:
      - management-ui/shared/dist/
      - management-ui/backend/dist/
      - management-ui/frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Автоматическая установка Docker (для Umami)
install:docker:
  stage: install
  tags:
    - deploy-root
  needs: []
  script:
    - bash scripts/ci/install-docker.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Автоматическая установка Umami Analytics
install:umami:
  stage: install
  tags:
    - deploy-root
  needs: [install:docker]
  script:
    - bash scripts/single-machine/install-umami.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Ручная установка компонентов (кнопка Play в GitLab UI)
install:authelia:
  stage: install
  tags:
    - deploy-root
  needs: []
  script:
    - bash scripts/single-machine/install-authelia.sh
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

install:frps:
  stage: install
  tags:
    - deploy-root
  needs: []
  script:
    - bash scripts/single-machine/install-frps.sh
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

install:fileserver:
  stage: install
  tags:
    - deploy-root
  needs: [install:docker]
  script:
    - bash scripts/single-machine/install-fileserver.sh
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

install:gitlab-oidc:
  stage: install
  tags:
    - deploy-root
  needs: []
  script:
    - bash scripts/single-machine/configure-gitlab-oidc.sh
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Автоматическая установка Vikunja Task Planner
install:vikunja:
  stage: install
  tags:
    - deploy-root
  needs: [install:docker]
  script:
    - bash scripts/single-machine/install-vikunja.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  tags:
    - deploy-root
  needs: [build:management-ui, install:docker, install:umami, install:vikunja, sync:configs]
  script:
    # Рендеринг конфигов из шаблонов + CI Variables
    - bash scripts/ci/render-configs.sh

    # Деплой Management UI
    - bash scripts/ci/deploy-management-ui.sh

    # Деплой DNS API
    - bash scripts/ci/deploy-dns-api.sh

    # Деплой Traefik-конфигов (dynamic auto-reload + static с рестартом)
    - bash scripts/ci/deploy-traefik.sh

    # Деплой DNS-записей из GitOps (config/<server>/dns/records.json)
    - bash scripts/ci/deploy-dns-records.sh

    # Деплой Authelia SSO (обновление конфигов если установлена)
    - bash scripts/ci/deploy-authelia.sh

    # Деплой Authelia users из GitOps (config/<server>/authelia/)
    - bash scripts/ci/deploy-authelia-users.sh

    # Деплой RU Proxy доменов из GitOps (config/<server>/ru-proxy/domains.json)
    - bash scripts/ci/deploy-ru-proxy.sh

    # Деплой Umami Analytics (обновление конфигов и образов если установлен)
    - bash scripts/ci/deploy-umami.sh

    # Деплой файлового сервера (обновление конфигов и образов если установлен)
    - bash scripts/ci/deploy-fileserver.sh

    # Деплой Vikunja Task Planner (обновление конфигов и образов если установлен)
    - bash scripts/ci/deploy-vikunja.sh

    # Деплой Mailu (обновление PROXY_AUTH если установлен)
    - bash scripts/ci/deploy-mailu.sh

    # Копирование скриптов обслуживания
    - mkdir -p /opt/borisovai-admin/scripts
    - cp -r scripts/single-machine/ /opt/borisovai-admin/scripts/single-machine/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

verify:
  stage: verify
  tags:
    - deploy-production
  script:
    - bash scripts/ci/health-check.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
